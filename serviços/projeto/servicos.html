<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/servicos.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Agenda Fácil</title>
</head>

<body class="bg-gray-100">

    <!-- MENU -->
    <header class="topo text-white">
        <div class="topo-container">
            <div class="logo">Agenda Fácil</div>

            <nav>
                <a href="principal.html">Início</a>
                <a href="../perfil/cliente.html">Meus agendamentos</a>
                <a href="../cadastro/prestador.html">Quero ser prestador</a>
            </nav>
        </div>
    </header>

    <!-- CONTAINER -->
    <div class="container mx-auto max-w-6xl p-6 md:p-10">

        <h1 class="text-2xl font-bold mb-6">Serviços Disponíveis</h1>

        <!-- BUSCA + FILTRO -->
        <div class="flex flex-col md:flex-row gap-3 mb-6">

            <input id="busca" type="text"
                placeholder="Buscar serviço..."
                class="flex-1 p-3 rounded-lg border border-gray-300" />

            <select id="filtroCategoria"
                class="p-3 rounded-lg border border-gray-300">

                <option value="todas">Todas as categorias</option>
                <option value="tecnologia">Tecnologia</option>
                <option value="mecanica">Mecânica</option>
                <option value="eletrica">Elétrica</option>
                <option value="hidraulica">Hidráulica</option>
                <option value="reformas">Reformas</option>
                <option value="limpeza">Limpeza</option>

            </select>

        </div>

        <!-- GRID DINÂMICO (AGORA VAZIO) -->
        <div id="lista-servicos"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

            <!-- OS CARDS SERÃO INSERIDOS AUTOMATICAMENTE PELO JS -->

        </div>

        <!-- CTA -->
        <div class="orcamentos-card col-span-full flex justify-center mt-10">

            <div class="text-center bg-white p-8 rounded-xl shadow max-w-xl w-full">

                <h2 class="text-xl font-semibold mb-2">
                    Não achou seu serviço?
                </h2>

                <p class="text-gray-600 mb-4">
                    Solicite um orçamento personalizado.
                </p>

                <a href="orcamentos.html"
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">
                    Solicitar orçamento
                </a>

            </div>

        </div>

    </div>

    <!-- SCRIPT DE FILTRO + RENDER -->
    <script src="script.js"></script>

</body>
</html>
