<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agenda Fácil</title>

  
  <script src="https://cdn.tailwindcss.com"></script>

  
  <link rel="stylesheet" href="css/agendamentos.css">
</head>

<body class="bg-gray-100">

 
  <header class="bg-gradient-to-r from-slate-900 to-blue-900 text-white p-4 flex justify-between items-center">

    <h1 class="text-lg font-semibold">📅 Agenda Fácil</h1>

    
    <nav class="space-x-4">
      <a href="#" class="text-gray-300">Início</a>
      <a href="#" class="text-gray-300">Serviços</a>
      <a href="#" class="bg-white/10 px-3 py-1 rounded text-white">Minhas Agendamentos</a>
      <a href="#" class="text-gray-300">Painel Prestador</a>
      <a href="#" class="text-gray-300">Admin</a>
    </nav>

  </header>

  
  <div class="p-10">

    <h2 class="text-2xl font-bold text-slate-800 mb-6">
      Meus Agendamentos
    </h2>

  
    <div class="flex gap-3 mb-6">

      <button class="tab active" data-tab="pendentes">Pendentes</button>
      <button class="tab" data-tab="concluidos">Concluídos</button>
      <button class="tab" data-tab="historico">Histórico</button>

    </div>

    
    <div id="cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    
    <div id="empty" class="text-center mt-20 hidden">
      <p class="text-gray-500 text-lg">
        Você ainda não tem agendamentos
      </p>

      <button class="mt-5 bg-gradient-to-r from-blue-600 to-blue-800 text-white px-6 py-2 rounded-lg">
        Agendar Serviço
      </button>
    </div>

  </div>

  
  <script src="ag.js"></script>

</body>
</html>
